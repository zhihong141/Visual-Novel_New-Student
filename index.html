<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Koshi & Yohji — 1-Week Visual Novel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ════════════════════════════════════════
       PASTEL COZY PALETTE
    ════════════════════════════════════════ */
    :root {
      --p-sky:        #c8e6f5;   /* soft sky blue  */
      --p-blush:      #f5c8d8;   /* cherry blossom */
      --p-mint:       #c8f0e0;   /* fresh mint     */
      --p-lemon:      #f5f0c0;   /* warm lemon     */
      --p-lavender:   #e0d0f5;   /* dreamy purple  */
      --p-peach:      #f5dfc8;   /* soft peach     */
      --p-rose:       #e8a0b8;   /* muted rose     */
      --p-sky-mid:    #90c8e8;
      --p-text:       #4a3f5c;   /* soft indigo ink */
      --p-text-soft:  #7a6e8a;
      --p-text-dim:   #a89eb8;

      /* Card surfaces */
      --card-bg:      rgba(255,248,252,.82);
      --card-border:  rgba(220,180,210,.45);
      --card-shadow:  0 4px 20px rgba(150,110,160,.12), 0 1px 4px rgba(150,110,160,.08);
      --card-shadow-lg: 0 12px 40px rgba(150,110,160,.18), 0 2px 8px rgba(150,110,160,.10);

      /* Dialogue */
      --dlg-bg:       rgba(255,248,252,.90);
      --dlg-border:   rgba(220,180,210,.50);

      --radius:       22px;
      --radius-sm:    14px;
      --font-head:    'Quicksand', 'Segoe UI', sans-serif;
      --font-body:    'Nunito', 'Segoe UI', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html {
      height: 100%;
      height: -webkit-fill-available;
    }
    body {
      font-family: var(--font-body);
      color: var(--p-text);
      background: #e8d8f0;
      overflow: hidden;
      user-select: none;
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
    }

    /* ── GAME CONTAINER — dvh excludes the Android Chrome browser bar ── */
    #game {
      position: relative;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      padding-left:   env(safe-area-inset-left,   0px);
      padding-right:  env(safe-area-inset-right,  0px);
    }

    /* ── BACKGROUND ── */
    #bg {
      position: absolute; inset: 0;
      transition: background 900ms ease;
    }

    /* soft vignette overlay */
    #bg::after {
      content: "";
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 120% 100% at 50% 50%, transparent 40%, rgba(220,200,240,.25) 100%);
      pointer-events: none;
    }

    /* ── FLOATING SPARKLES / PETALS ── */
    #petals { position: absolute; inset: 0; pointer-events: none; overflow: hidden; z-index: 3; }
    .petal {
      position: absolute;
      opacity: 0;
      animation: petalFall linear infinite;
      border-radius: 50% 10% 50% 10%;
    }
    @keyframes petalFall {
      0%   { transform: translate(0, -30px) rotate(0deg) scale(.8); opacity: 0; }
      8%   { opacity: .7; }
      85%  { opacity: .5; }
      100% { transform: translate(var(--drift), 108vh) rotate(var(--spin)) scale(1); opacity: 0; }
    }

    /* little floating stars */
    .sparkle {
      position: absolute;
      width: 6px; height: 6px;
      border-radius: 50%;
      opacity: 0;
      animation: sparklePop ease-in-out infinite;
    }
    @keyframes sparklePop {
      0%, 100% { transform: scale(0); opacity: 0; }
      50%       { transform: scale(1); opacity: .65; }
    }

    /* ── CHARACTER SILHOUETTES ── */
    .char {
      position: absolute; bottom: 155px;
      width: min(28vw, 340px); height: min(62vh, 660px);
      opacity: 0; pointer-events: none;
      transition: opacity 600ms ease;
    }
    .char.visible { opacity: .20; }
    #charL { left: 1.5vw; }
    #charR { right: 1.5vw; transform: scaleX(-1); }
    .char::before {
      content: ""; position: absolute; inset: 0;
      border-radius: 100px 100px 30px 30px;
      background: radial-gradient(ellipse at 50% 12%, rgba(180,140,200,.40), rgba(200,160,210,.15) 50%, transparent 72%);
    }
    .char::after {
      content: ""; position: absolute; left: 20%; right: 20%; bottom: 4%; height: 26%;
      border-radius: 20px;
      background: linear-gradient(to top, rgba(200,160,210,.18), transparent);
    }
    .charLabel {
      position: absolute; bottom: -22px; left: 50%; transform: translateX(-50%);
      font-family: var(--font-head); font-size: 10px; font-weight: 600;
      color: var(--p-rose); letter-spacing: .08em; text-transform: uppercase;
      opacity: .7; white-space: nowrap;
    }

    /* ══════════════════════════════════════
       HUD — TOP BAR
    ══════════════════════════════════════ */
    #hud {
      position: absolute; top: 12px; left: 12px; right: 12px;
      display: flex; gap: 8px; align-items: stretch; z-index: 30;
    }

    .hudCard {
      position: relative;
      background: var(--card-bg);
      backdrop-filter: blur(18px) saturate(1.6);
      border: 1.5px solid var(--card-border);
      border-radius: var(--radius);
      box-shadow: var(--card-shadow);
      padding: 8px 12px;
      display: flex; align-items: center; gap: 8px;
      min-height: 0;
    }
    .hudCard::before {
      content: "";
      position: absolute; top: 0; left: 12px; right: 12px; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.80), transparent);
      border-radius: 99px;
    }

    /* Location pill */
    #loc { flex: 1; min-width: 190px; gap: 9px; }
    #locDot {
      width: 9px; height: 9px; border-radius: 50%; flex: none;
      background: linear-gradient(135deg, var(--p-rose), var(--p-lavender));
      box-shadow: 0 0 0 3px rgba(232,160,184,.25), 0 0 10px rgba(232,160,184,.35);
    }
    #locText {
      font-family: var(--font-head); font-weight: 600; font-size: 12px;
      color: var(--p-text-soft);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* Stat bars */
    #stats { display: flex; gap: 12px; flex-wrap: wrap; }
    .stat { display: flex; flex-direction: column; gap: 4px; min-width: 96px; }
    .statLabel {
      font-family: var(--font-head); font-size: 10px; font-weight: 700;
      letter-spacing: .09em; text-transform: uppercase;
      display: flex; align-items: center; gap: 4px;
      color: var(--p-text-dim);
    }
    .statEmoji { font-size: 10px; }
    .bar {
      height: 7px; border-radius: 99px;
      background: rgba(150,110,160,.10);
      overflow: hidden;
      border: 1px solid rgba(200,160,210,.20);
    }
    .fill {
      height: 100%; width: 0%;
      border-radius: 99px;
      transition: width 400ms cubic-bezier(.34, 1.56, .64, 1);
    }
    #trustFill  { background: linear-gradient(90deg, #e8a0c0, #c878a8); }
    #warmthFill { background: linear-gradient(90deg, #f0c060, #e8a040); }
    #balanceFill{ background: linear-gradient(90deg, #80d0c0, #50b8a8); }

    /* Controls */
    #controls { margin-left: auto; display: flex; gap: 5px; flex-wrap: nowrap; align-items: center; }

    button.ui {
      background: linear-gradient(160deg, rgba(255,248,255,.80), rgba(240,228,250,.70));
      color: var(--p-text-soft);
      border: 1.5px solid rgba(210,175,225,.50);
      border-radius: 99px;
      padding: 0 13px;
      height: 30px;
      font-family: var(--font-head); font-size: 11px; font-weight: 700;
      letter-spacing: .03em;
      cursor: pointer;
      display: flex; align-items: center;
      transition: all 160ms ease;
      box-shadow: 0 1px 3px rgba(150,110,160,.10), inset 0 1px 0 rgba(255,255,255,.70);
      white-space: nowrap;
    }
    button.ui:hover {
      background: linear-gradient(160deg, rgba(255,248,255,.98), rgba(240,228,250,.90));
      border-color: rgba(210,175,225,.80);
      color: var(--p-text);
      box-shadow: 0 3px 10px rgba(150,110,160,.18), inset 0 1px 0 rgba(255,255,255,.80);
      transform: translateY(-1px);
    }
    button.ui:active { transform: translateY(0); box-shadow: 0 1px 3px rgba(150,110,160,.10); }
    button.ui[aria-pressed="true"] {
      background: linear-gradient(135deg, rgba(232,160,184,.35), rgba(200,160,230,.30));
      border-color: rgba(210,140,190,.60);
      color: var(--p-text);
      box-shadow: inset 0 1px 4px rgba(180,120,160,.15);
    }

    /* ══════════════════════════════════════
       DIALOGUE BOX
    ══════════════════════════════════════ */
    #dialogueWrap {
      position: absolute; left: 0; right: 0; bottom: 0;
      padding: 10px 14px 16px;
      /* Extra bottom breathing room for Android nav bar / iOS home swipe bar */
      padding-bottom: max(16px, env(safe-area-inset-bottom, 16px));
      z-index: 40;
    }
    #dialogue {
      max-width: 1060px; margin: 0 auto;
      background: var(--dlg-bg);
      backdrop-filter: blur(20px) saturate(1.5);
      border: 1.5px solid var(--dlg-border);
      border-radius: calc(var(--radius) + 4px);
      box-shadow: var(--card-shadow-lg), inset 0 1.5px 0 rgba(255,255,255,.75);
      padding: 14px 18px 16px;
      position: relative;
    }
    /* top shimmer line */
    #dialogue::before {
      content: "";
      position: absolute; top: 0; left: 20px; right: 20px; height: 1.5px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.90), transparent);
      border-radius: 99px;
    }
    /* decorative bottom-right flower */
    #dialogue::after {
      content: "✿";
      position: absolute; right: 16px; bottom: 12px;
      font-size: 16px; color: rgba(220,160,190,.30);
      pointer-events: none;
    }

    /* Speaker nameplate */
    #nameplate {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 5px 14px 5px 10px;
      border-radius: 99px;
      background: linear-gradient(135deg, rgba(248,224,235,.90), rgba(232,200,248,.70));
      border: 1.5px solid rgba(220,170,200,.50);
      box-shadow: 0 2px 8px rgba(180,130,180,.14), inset 0 1px 0 rgba(255,255,255,.70);
    }
    #nameDot {
      width: 7px; height: 7px; border-radius: 50%;
      background: linear-gradient(135deg, #e898b8, #c878d8);
      box-shadow: 0 0 6px rgba(220,140,200,.50);
      flex: none;
    }
    #speaker {
      font-family: var(--font-head); font-weight: 700; font-size: 13px;
      color: var(--p-text); letter-spacing: .02em;
    }

    #meta {
      position: absolute; right: 16px; top: 14px;
      display: flex; gap: 7px; align-items: center;
      font-family: var(--font-head); font-size: 10px; font-weight: 600;
      color: var(--p-text-dim);
    }
    #sfxLabel {
      padding: 4px 10px; border-radius: 99px;
      border: 1.5px solid rgba(200,200,240,.40);
      background: rgba(220,210,240,.20);
      max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      display: none; font-style: italic;
    }
    #hint {
      padding: 4px 10px; border-radius: 99px;
      border: 1.5px solid rgba(200,200,240,.40);
      background: rgba(220,210,240,.20);
      letter-spacing: .04em;
    }

    /* Dialogue text */
    #text {
      margin-top: 10px;
      font-family: var(--font-body); font-size: 16.5px; line-height: 1.72;
      color: var(--p-text); min-height: 80px; white-space: pre-wrap;
      font-weight: 400;
    }
    #tapCatcher {
      position: absolute; inset: 0;
      border-radius: calc(var(--radius) + 4px);
      cursor: pointer; z-index: 1;
    }

    /* ── CHOICE BUTTONS ── */
    #choices { margin-top: 12px; display: none; gap: 8px; flex-direction: column; position: relative; z-index: 5; }
    .choiceBtn {
      text-align: left;
      -webkit-appearance: none; appearance: none;
      font-family: var(--font-body); font-size: 14px; font-weight: 500;
      color: var(--p-text);
      background: linear-gradient(135deg, rgba(255,248,252,.80), rgba(240,224,252,.60));
      border: 1.5px solid rgba(210,175,225,.45);
      border-radius: var(--radius-sm);
      padding: 11px 16px 11px 38px;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(150,110,160,.08), inset 0 1px 0 rgba(255,255,255,.65);
      transition: all 160ms ease;
      position: relative;
    }
    .choiceBtn::before {
      content: "🌸";
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      font-size: 13px; opacity: .45;
      transition: opacity 160ms ease, transform 160ms ease;
    }
    .choiceBtn:hover {
      background: linear-gradient(135deg, rgba(255,248,252,.98), rgba(240,224,252,.90));
      border-color: rgba(220,160,200,.70);
      box-shadow: 0 4px 16px rgba(180,120,180,.16), inset 0 1px 0 rgba(255,255,255,.80);
      transform: translateY(-1px);
      color: #3a2e50;
    }
    .choiceBtn:hover::before { opacity: .90; transform: translateY(-50%) scale(1.15); }
    .choiceBtn:active { transform: translateY(0); }
    .choiceMeta {
      font-family: var(--font-head); font-size: 10px; font-weight: 600;
      color: var(--p-text-dim); margin-top: 4px; font-style: italic;
    }

    /* ══════════════════════════════════════
       LOG PANEL
    ══════════════════════════════════════ */
    #logPanel {
      position: absolute; inset: 70px 12px 155px 12px;
      z-index: 60; display: none;
      max-width: 1060px; margin: 0 auto;
      background: rgba(252,246,255,.92);
      backdrop-filter: blur(20px) saturate(1.5);
      border: 1.5px solid rgba(210,175,225,.50);
      border-radius: calc(var(--radius) + 4px);
      box-shadow: var(--card-shadow-lg);
      overflow: hidden;
    }
    #logHeader {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1.5px solid rgba(210,175,225,.25);
      font-family: var(--font-head); font-size: 13px; font-weight: 700;
      color: var(--p-text-soft);
    }
    #logHeaderTitle { display: flex; align-items: center; gap: 7px; }
    #logBody {
      padding: 14px 18px;
      height: calc(100% - 50px); overflow: auto;
      font-family: var(--font-body); font-size: 14px; line-height: 1.60;
      color: var(--p-text); white-space: pre-wrap;
    }
    #logBody::-webkit-scrollbar { width: 5px; }
    #logBody::-webkit-scrollbar-track { background: rgba(200,180,220,.08); }
    #logBody::-webkit-scrollbar-thumb { background: rgba(200,160,210,.35); border-radius: 99px; }
    .logLine { margin-bottom: 10px; }
    .logSpeaker { font-family: var(--font-head); font-weight: 700; font-size: 12px; color: var(--p-rose); margin-right: 6px; }

    /* ══════════════════════════════════════
       CUSTOM MODAL (replaces browser prompt/confirm)
    ══════════════════════════════════════ */
    #modalOverlay {
      position: absolute; inset: 0;
      background: rgba(180,150,210,.22);
      backdrop-filter: blur(6px);
      z-index: 100;
      display: none;
      align-items: center; justify-content: center;
    }
    #modalOverlay.open { display: flex; animation: modalFadeIn 200ms ease; }
    @keyframes modalFadeIn {
      from { opacity: 0; transform: scale(.97); }
      to   { opacity: 1; transform: scale(1); }
    }
    #modalBox {
      background: linear-gradient(160deg, rgba(255,250,255,.97), rgba(248,236,255,.95));
      border: 2px solid rgba(220,180,230,.55);
      border-radius: calc(var(--radius) + 2px);
      box-shadow: 0 20px 60px rgba(150,100,180,.22), 0 4px 16px rgba(150,100,180,.12),
                  inset 0 2px 0 rgba(255,255,255,.85);
      padding: 28px 28px 22px;
      width: min(380px, 90vw);
      display: flex; flex-direction: column; gap: 18px;
      position: relative;
    }
    #modalBox::before {
      content: "";
      position: absolute; top: 0; left: 16px; right: 16px; height: 2px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.90), transparent);
      border-radius: 99px;
    }
    #modalTitle {
      font-family: var(--font-head); font-size: 16px; font-weight: 700;
      color: var(--p-text);
      display: flex; align-items: center; gap: 8px;
    }
    #modalTitle .modal-icon { font-size: 20px; }
    #modalDesc {
      font-family: var(--font-body); font-size: 13px; color: var(--p-text-soft);
      line-height: 1.5; margin-top: -6px;
    }
    /* Save slot grid */
    #modalSlots { display: flex; flex-direction: column; gap: 8px; }
    .slotBtn {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      border: 1.5px solid rgba(210,175,225,.40);
      background: linear-gradient(135deg, rgba(255,248,252,.80), rgba(240,224,252,.55));
      cursor: pointer;
      transition: all 160ms ease;
      font-family: var(--font-body);
      box-shadow: 0 1px 4px rgba(150,110,160,.07), inset 0 1px 0 rgba(255,255,255,.65);
    }
    .slotBtn:hover {
      background: linear-gradient(135deg, rgba(255,248,252,.98), rgba(240,224,252,.88));
      border-color: rgba(220,160,200,.65);
      transform: translateX(3px);
      box-shadow: 0 3px 12px rgba(180,120,180,.14);
    }
    .slotBtn:active { transform: translateX(0); }
    .slotIcon { font-size: 18px; flex: none; }
    .slotInfo { flex: 1; text-align: left; }
    .slotName { font-size: 13px; font-weight: 700; color: var(--p-text); }
    .slotDate { font-size: 11px; color: var(--p-text-dim); margin-top: 2px; }
    /* Confirm modal buttons */
    #modalBtns { display: flex; gap: 8px; justify-content: flex-end; }
    .modalBtn {
      padding: 9px 20px; border-radius: var(--radius-sm);
      font-family: var(--font-head); font-size: 12px; font-weight: 700;
      cursor: pointer; transition: all 160ms ease; border: 1.5px solid;
      letter-spacing: .03em;
    }
    .modalBtn.cancel {
      background: rgba(240,230,250,.70); color: var(--p-text-soft);
      border-color: rgba(200,180,220,.40);
    }
    .modalBtn.cancel:hover { background: rgba(240,230,250,.95); border-color: rgba(200,180,220,.70); }
    .modalBtn.confirm {
      background: linear-gradient(135deg, #e8a8d0, #c890e0);
      color: #fff; border-color: rgba(200,130,200,.50);
      box-shadow: 0 2px 8px rgba(200,130,220,.30);
    }
    .modalBtn.confirm:hover { background: linear-gradient(135deg, #f0b8d8, #d8a0f0); transform: translateY(-1px); }
    .modalBtn.confirm:active { transform: translateY(0); }
    .modalBtn.danger {
      background: linear-gradient(135deg, #f0a8a8, #e07878);
      color: #fff; border-color: rgba(220,100,100,.40);
      box-shadow: 0 2px 8px rgba(220,100,100,.25);
    }
    .modalBtn.danger:hover { background: linear-gradient(135deg, #f8b8b8, #e89090); transform: translateY(-1px); }

    /* ── Toast notification ── */
    #toast {
      position: absolute; bottom: 180px; left: 50%; transform: translateX(-50%) translateY(10px);
      background: linear-gradient(135deg, rgba(255,248,252,.96), rgba(240,224,252,.94));
      border: 1.5px solid rgba(220,175,220,.55);
      border-radius: 99px;
      padding: 8px 20px;
      font-family: var(--font-head); font-size: 12px; font-weight: 700;
      color: var(--p-text-soft);
      box-shadow: var(--card-shadow);
      z-index: 80;
      pointer-events: none;
      opacity: 0;
      transition: opacity 300ms ease, transform 300ms ease;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ══════════════════════════════════════
       RESPONSIVE — PORTRAIT MOBILE
    ══════════════════════════════════════ */
    @media (max-width: 720px) and (orientation: portrait) {
      #text { font-size: 15px; min-height: 64px; }
      .stat  { min-width: 84px; }
      button.ui { padding: 0 9px; font-size: 10px; height: 27px; }
      .char  { display: none; }
      #hud   { gap: 6px; }
      #loc   { min-width: 120px; }
      #controls { flex-wrap: wrap; }
      #modalBox { padding: 22px 18px 18px; }
    }

    /* ══════════════════════════════════════
       RESPONSIVE — LANDSCAPE PHONE
       Targets phones in landscape (height < 500px)
    ══════════════════════════════════════ */
    @media (max-height: 500px) and (orientation: landscape) {

      /* Kill character art — no vertical room */
      .char { display: none; }
      #petals .sparkle { display: none; }

      /* ── HUD: single slim strip ── */
      #hud {
        top: 6px; left: 6px; right: 6px;
        gap: 5px;
        flex-wrap: nowrap;
        align-items: center;
      }
      .hudCard {
        padding: 5px 10px;
        border-radius: 12px;
        gap: 6px;
      }
      .hudCard::before { display: none; } /* skip shimmer line */

      /* Location: shrink */
      #loc { min-width: 0; flex: 0 1 auto; max-width: 130px; }
      #locDot { width: 7px; height: 7px; }
      #locText { font-size: 10px; }

      /* Stats: horizontal compact — all 3 in a row */
      #stats { gap: 8px; flex-wrap: nowrap; }
      .stat { min-width: 0; flex: 1; gap: 2px; }
      .statLabel { font-size: 9px; letter-spacing: .05em; gap: 2px; }
      .statEmoji { display: none; }
      .bar { height: 5px; }

      /* Controls: all buttons in one tight row */
      #controls {
        gap: 4px;
        flex-wrap: nowrap;
        margin-left: auto;
      }
      button.ui {
        height: 24px;
        padding: 0 9px;
        font-size: 10px;
        border-radius: 99px;
        border-width: 1px;
      }

      /* ── Dialogue: compact, leaves room for story ── */
      #dialogueWrap {
        padding: 5px 8px 8px;
      }

    function stripNumPrefix(line){ return line.replace(/^\d+\.\s*/, '').trim(); }

    function parseEffects(bracketText){
      const eff = { trust:0, warmth:0, balance:0 };
      const s = (bracketText||'').replace(/[^\w+\-, ]/g,'').trim();
      if (!s) return eff;
      s.split(',').map(x=>x.trim()).filter(Boolean).forEach(part=>{
        const m = part.match(/^(Trust|Warmth|Balance)\s*([+-]\d+)/i);

        const key = m[1].toLowerCase();

        if (key === 'warmth') eff.warmth += val;
        if (key === 'balance') eff.balance += val;
      });
      return eff;

    function parseOption(line){
      const m = line.match(/^Option\s+([A-Z])\s*\((.*?)\)\s*(\[[^\]]+\])?\s*(\([^)]+\))?\s*:\s*(.*)$/);
      if (!m) return { key:'A', text: line, effects:{trust:0,warmth:0,balance:0}, flagsSet:[] };
      const key = m[1];
      const bracket = (m[3]||'').replace(/^\[|\]$/g,'');
      const extra = m[4] || '';
      const text = m[5] || '';
      const effects = parseEffects(bracket);
      const flagsSet = [];

      if (extra.includes('SECRET FLAG S3')) flagsSet.push('S3');
      return { key, text, effects, flagsSet };
    }

    function parseLine(line){

      if (m) return { type:'line', speaker:m[1], text:m[2] };
      return { type:'line', speaker:'', text:line };

    function parseRaw(raw){
      const rawLines = raw.split('\n').map(l=>l.trim()).filter(Boolean);
      const lines = rawLines.map(stripNumPrefix);

      const main = [];
      const endings = { good:[], neutral:[], bad:[], secret:[] };
      let mode = 'main';
      function targetArr(){ return mode==='main' ? main : endings[mode]; }

      let i = 0;
      while(i < lines.length){
        const line = lines[i];

        if (line.startsWith('[GOOD ENDING')){ mode='good'; i++; continue; }
        if (line.startsWith('[NEUTRAL ENDING')){ mode='neutral'; i++; continue; }
        if (line.startsWith('[BAD ENDING')){ mode='bad'; i++; continue; }
        if (line.startsWith('[SECRET ENDING')){ mode='secret'; i++; continue; }
        if (line === '[END]'){ mode='main'; i++; continue; }

        const out = targetArr();

        if (line.startsWith('[DAY')){
          out.push({type:'day', text: line.replace(/^\[|\]$/g,'')});
          i++; continue;
        }

        const bgm = line.match(/^\[BG:\s*(.*?)\]/);
        if (bgm){ out.push({type:'bg', label:bgm[1]}); i++; continue; }

        const sfxm = line.match(/^\[SFX:\s*(.*?)\]/);
        if (sfxm){ out.push({type:'sfx', text:sfxm[1]}); i++; continue; }

        if (line.startsWith('SECRET FLAG')){ out.push({type:'flagcmd', raw:line}); i++; continue; }

        if (line.startsWith('CHOICE:')){
          const prompt = line.replace('CHOICE:','').trim();
          i++;
          const options = [];
          while(i < lines.length && lines[i].startsWith('Option ')){
            options.push(parseOption(lines[i]));
            i++;
          }

          const branches = {};
          if (i < lines.length && lines[i].startsWith('[If ')){
            while(i < lines.length && lines[i].startsWith('[If ')){
              const km = lines[i].match(/^\[If\s+([A-Z])\]/);
              const key = km ? km[1] : 'A';
              i++;
              const bsteps = [];
              while(i < lines.length){
                const l2 = lines[i];
                if (l2.startsWith('[If ')) break;
                if (l2.startsWith('CHOICE:')) break;
                if (l2.startsWith('[DAY')) break;
                if (l2.startsWith('[BG:')) break;
                if (l2.startsWith('[SFX:')) break;
                if (l2.startsWith('[GOOD ENDING') || l2.startsWith('[NEUTRAL ENDING') || l2.startsWith('[BAD ENDING') || l2.startsWith('[SECRET ENDING') || l2 === '[END]') break;
                if (l2.startsWith('Option ')) break;

                if (l2.startsWith('SECRET FLAG')){ bsteps.push({type:'flagcmd', raw:l2}); i++; continue; }
                bsteps.push(parseLine(l2));
                i++;
              }
              branches[key] = bsteps;
            }
          }

          out.push({type:'choice', prompt, options, branches});
          continue;
        }

        out.push(parseLine(line));
        i++;
      }

      main.push({type:'end_eval'});
      return { main, endings };
    }

          setStat('warmth', opt.effects.warmth || 0);
          setStat('balance', opt.effects.balance || 0);
          opt.flagsSet.forEach(f=>state.flags[f] = true);

          if (/invite\s+yohji/i.test(step.prompt)){
            if (/rooftop/i.test(opt.text)) state.invite = 'rooftop';
            if (/arcade/i.test(opt.text)) state.invite = 'arcade';
          }

          clearChoices();

          const branch = step.branches?.[opt.key];
          if (branch && branch.length){
            queue = branch.concat(queue);
          }

          showNext();
        });

        el.choices.appendChild(btn);
      });
    }

    function applyFlagCmd(raw){
      const m = raw.match(/SECRET FLAG\s+(S\d)/i);
      if (!m) return;
      const f = m[1].toUpperCase();
      if (f === 'S3'){
        if (state.balance >= 3) state.flags.S3 = true;
      } else {
        state.flags[f] = true;
      }
    }

    function evaluateEnding(){
      const t = state.trust, w = state.warmth, b = state.balance;
      const s1 = state.flags.S1, s2 = state.flags.S2, s3 = state.flags.S3;

      if (t === 5 && w === 5 && b >= 4 && s1 && s2 && s3 && state.invite === 'arcade') return 'secret';
      if (t >= 4 && w >= 4 && b >= 3 && state.invite === 'rooftop') return 'good';
      if (t >= 3 && t <= 4) return 'neutral';
      return 'bad';
    }

    function showNext(){
      // If a choice is on screen, you must pick it first.
      if (el.choices.style.display === 'flex') return;

      // If currently typing, finish instantly
      if (typingTimer){
        stopTyping();
        if (state.lastLine) el.text.textContent = state.lastLine.text;
        if (state.auto) scheduleAuto();
        return;
      }

      // Skip fast-forward until next choice / ending
      if (state.skip){
        let safety = 0;
        while(queue.length && safety++ < 2500){
          const peek = queue[0];
          if (peek.type === 'choice' || peek.type === 'end_eval') break;

          queue.shift();

          if (peek.type === 'bg') setBg(peek.label);
          if (peek.type === 'sfx') setSfx(peek.text);
          if (peek.type === 'flagcmd') applyFlagCmd(peek.raw);
          if (peek.type === 'line'){
            pushLog(peek.speaker === 'Narration' ? '' : peek.speaker, peek.text);
            state.lastLine = { speaker: peek.speaker === 'Narration' ? '' : peek.speaker, text: peek.text };
          }
          if (peek.type === 'day'){
            pushLog('', peek.text);
            state.lastLine = { speaker:'', text: peek.text };
          }
        }
      }

      const step = queue.shift();
      if (!step){
        setDialogue('', 'The End.');
        clearChoices();
        setSfx('');
        return;
      }

      if (step.type === 'bg'){ setBg(step.label); return showNext(); }
      if (step.type === 'sfx'){ setSfx(step.text); return showNext(); }
      if (step.type === 'flagcmd'){ applyFlagCmd(step.raw); return showNext(); }

      if (step.type === 'day'){
        state.lastLine = { speaker:'', text: step.text };
        pushLog('', step.text);
        setDialogue('', step.text);
        if (state.auto) scheduleAuto();
        return;
      }

      if (step.type === 'choice'){
        showChoices(step);
        return;
      }

      if (step.type === 'end_eval'){
        const route = evaluateEnding();
        queue = SCRIPT.endings[route].slice().concat([{type:'line', speaker:'', text:'[END]'}]);
        state.lastLine = { speaker:'', text:`Route decided: ${route.toUpperCase()}` };
        setDialogue('', state.lastLine.text + ' (click to continue)');
        if (state.auto) scheduleAuto();
        return;
      }

      // Normal line
      const speaker = (step.speaker === 'Narration') ? '' : step.speaker;
      state.lastLine = { speaker, text: step.text };
      pushLog(speaker, step.text);
      setDialogue(speaker, step.text);
      if (state.auto) scheduleAuto();
    }

    function resetGame(){
      state.trust = 0; state.warmth = 0; state.balance = 0;
      state.flags = { S1:false, S2:false, S3:false };
      state.invite = null;
      state.auto = false; state.skip = false;
      state.lastLine = null;
      state.log = [];
      el.btnAuto.setAttribute('aria-pressed','false');
      el.btnSkip.setAttribute('aria-pressed','false');
      setSfx('');
      queue = SCRIPT.main.slice();
      renderStats();
      showNext();
    }

    // ===== CUSTOM MODAL SYSTEM =====
    const SAVE_KEY = 'koshi_yohji_vn_save_v1';
    const modalOverlay = document.getElementById('modalOverlay');
    const modalIcon    = document.getElementById('modalIcon');
    const modalTitleText = document.getElementById('modalTitleText');
    const modalDesc    = document.getElementById('modalDesc');
    const modalSlots   = document.getElementById('modalSlots');
    const modalBtns    = document.getElementById('modalBtns');
    const toastEl      = document.getElementById('toast');

    function openModal(){ modalOverlay.classList.add('open'); }
    function closeModal(){ modalOverlay.classList.remove('open'); }
    modalOverlay.addEventListener('click', (e)=>{ if(e.target === modalOverlay) closeModal(); });

    function showToast(msg, emoji='✨'){
      toastEl.textContent = emoji + '  ' + msg;
      toastEl.classList.add('show');
      clearTimeout(toastEl._t);
      toastEl._t = setTimeout(()=> toastEl.classList.remove('show'), 2200);
    }

    function formatDate(ts){
      if(!ts) return 'Empty';
      const d = new Date(ts);
      return d.toLocaleDateString('en', {month:'short',day:'numeric'}) + ' · ' + d.toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'});
    }

    function getSaves(){
      try { return JSON.parse(localStorage.getItem(SAVE_KEY) || '{}'); }
      catch(e){ return {}; }
    }

    const slotEmojis = ['🌸','🌼','🍀'];
    const slotNames  = ['Slot 1','Slot 2','Slot 3'];

    function saveStateObject(){
      return {
        trust: state.trust, warmth: state.warmth, balance: state.balance,
        flags: state.flags, invite: state.invite,
        auto: state.auto, skip: state.skip,
        log: state.log, queue: queue,
        lastLine: state.lastLine,
        sfx: el.sfxLabel.textContent || '',
        loc: el.locText.textContent || ''
      };
    }

    function loadStateObject(obj){
      state.trust   = clamp(obj.trust||0);
      state.warmth  = clamp(obj.warmth||0);
      state.balance = clamp(obj.balance||0);
      state.flags   = obj.flags || {S1:false,S2:false,S3:false};
      state.invite  = obj.invite ?? null;
      state.auto    = !!obj.auto;
      state.skip    = !!obj.skip;
      state.log     = Array.isArray(obj.log) ? obj.log : [];
      queue         = Array.isArray(obj.queue) ? obj.queue : SCRIPT.main.slice();
      state.lastLine = obj.lastLine || null;

      el.btnAuto.setAttribute('aria-pressed', state.auto ? 'true' : 'false');
      el.btnSkip.setAttribute('aria-pressed', state.skip ? 'true' : 'false');

      renderStats();
      setBg(obj.loc || '—');
      setSfx((obj.sfx||'').replace(/^SFX:\s*/,''));
      clearChoices();
      stopTyping();

      if(state.lastLine){
        el.speaker.textContent = state.lastLine.speaker || '—';
        el.text.textContent    = state.lastLine.text || '';
      } else {
        el.speaker.textContent = '—';
        el.text.textContent    = '';
      }
      if(state.auto) scheduleAuto();
    }

    function promptSave(){
      const saves = getSaves();
      modalIcon.textContent      = '💾';
      modalTitleText.textContent = 'Save Game';
      modalDesc.textContent      = 'Choose a slot to save your story~';
      modalBtns.innerHTML        = '';
      modalSlots.innerHTML       = '';
      [1,2,3].forEach((n,i)=>{
        const btn = document.createElement('button');
        btn.className = 'slotBtn';
        const info = saves[n];
        btn.innerHTML = `
          <span class="slotIcon">${slotEmojis[i]}</span>
          <span class="slotInfo">
            <div class="slotName">${slotNames[i]}</div>
            <div class="slotDate">${info ? formatDate(info.at) + ' — ' + (info.data.loc||'?') : 'Empty slot'}</div>
          </span>`;
        btn.addEventListener('click', ()=>{
          const all = getSaves();
          all[n] = { at: Date.now(), data: saveStateObject() };
          localStorage.setItem(SAVE_KEY, JSON.stringify(all));
          closeModal();
          showToast(`Saved to ${slotNames[i]}!`, slotEmojis[i]);
        });
        modalSlots.appendChild(btn);
      });
      const cancelBtn = document.createElement('button');
      cancelBtn.className = 'modalBtn cancel';
      cancelBtn.textContent = 'Cancel';
      cancelBtn.addEventListener('click', closeModal);
      modalBtns.appendChild(cancelBtn);
      openModal();
    }

    function promptLoad(){
      const saves = getSaves();
      modalIcon.textContent      = '📂';
      modalTitleText.textContent = 'Load Game';
      modalDesc.textContent      = 'Pick a save to continue your story~';
      modalBtns.innerHTML        = '';
      modalSlots.innerHTML       = '';
      [1,2,3].forEach((n,i)=>{
        const btn = document.createElement('button');
        btn.className = 'slotBtn';
        const info = saves[n];
        if(!info){ btn.style.opacity='.45'; btn.style.cursor='not-allowed'; }
        btn.innerHTML = `
          <span class="slotIcon">${slotEmojis[i]}</span>
          <span class="slotInfo">
            <div class="slotName">${slotNames[i]}</div>
            <div class="slotDate">${info ? formatDate(info.at) + ' — ' + (info.data.loc||'?') : 'Empty'}</div>
          </span>`;
        if(info){
          btn.addEventListener('click', ()=>{
            loadStateObject(info.data);
            closeModal();
            showToast(`Loaded ${slotNames[i]}!`, slotEmojis[i]);
          });
        }
        modalSlots.appendChild(btn);
      });
      const cancelBtn = document.createElement('button');
      cancelBtn.className = 'modalBtn cancel';
      cancelBtn.textContent = 'Cancel';
      cancelBtn.addEventListener('click', closeModal);
      modalBtns.appendChild(cancelBtn);
      openModal();
    }

    function promptRestart(){
      modalIcon.textContent      = '🌱';
      modalTitleText.textContent = 'Start Over?';
      modalDesc.textContent      = 'This will restart from the very beginning. Your saves are kept safe~';
      modalSlots.innerHTML       = '';
      modalBtns.innerHTML        = '';
      const cancelBtn = document.createElement('button');
      cancelBtn.className = 'modalBtn cancel';
      cancelBtn.textContent = 'No, stay here';
      cancelBtn.addEventListener('click', closeModal);
      const confirmBtn = document.createElement('button');
      confirmBtn.className = 'modalBtn danger';
      confirmBtn.textContent = 'Yes, restart 🌱';
      confirmBtn.addEventListener('click', ()=>{ closeModal(); resetGame(); showToast('Story restarted!','🌱'); });
      modalBtns.appendChild(cancelBtn);
      modalBtns.appendChild(confirmBtn);
      openModal();
    }

    // ===== Controls =====
    el.tap.addEventListener('click', showNext);
    window.addEventListener('keydown', (e)=>{
      const choicesOpen = (el.choices.style.display === 'flex');
      if(e.key === ' ' || e.key === 'Enter'){
        if(choicesOpen){ e.preventDefault(); return; }
        e.preventDefault();
        showNext();
      }
      if(e.key === 'Escape'){ closeModal(); toggleLog(false); }
    });

    el.btnAuto.addEventListener('click', ()=>{
      state.auto = !state.auto;
      el.btnAuto.setAttribute('aria-pressed', state.auto ? 'true' : 'false');
      if(state.auto) scheduleAuto(); else clearTimeout(autoTimer);
    });

    el.btnSkip.addEventListener('click', ()=>{
      state.skip = !state.skip;
      el.btnSkip.setAttribute('aria-pressed', state.skip ? 'true' : 'false');
      if(state.skip) showNext();
    });

    el.btnLog.addEventListener('click', ()=> toggleLog());
    el.btnCloseLog.addEventListener('click', ()=> toggleLog(false));
    el.btnSave.addEventListener('click', promptSave);
    el.btnLoad.addEventListener('click', promptLoad);
    el.btnRestart.addEventListener('click', promptRestart);

    // ── Pastel floating petals & sparkles ──
    (function spawnParticles(){
      const container = document.getElementById('petals');
      const petalColors  = ['#ffc8d8','#f8d0e8','#e8c8f8','#c8d8f8','#c8f0e0','#fff0b8','#ffd8b8'];
      const sparkleColors= ['#f8c0d8','#e0c8f8','#c0e0f8','#b8f0d8','#fff4b0'];

      for(let i=0;i<20;i++){
        const p = document.createElement('div');
        p.className = 'petal';
        const sz = 5 + Math.random()*9;
        p.style.cssText = `
          width:${sz}px; height:${sz*1.4}px;
          left:${Math.random()*108-4}%;
          background:${petalColors[Math.floor(Math.random()*petalColors.length)]};
          --drift:${(Math.random()-.5)*140}px;
          --spin:${Math.random()*720-360}deg;
          animation-duration:${14+Math.random()*22}s;
          animation-delay:${Math.random()*20}s;
          border-radius:${Math.random()>.5?'50% 10% 50% 10%':'10% 50% 10% 50%'};
          opacity:0;
        `;
        container.appendChild(p);
      }
      for(let i=0;i<12;i++){
        const s = document.createElement('div');
        s.className = 'sparkle';
        s.style.cssText = `
          left:${Math.random()*96+2}%;
          top:${Math.random()*70+5}%;
          width:${3+Math.random()*5}px; height:${3+Math.random()*5}px;
          background:${sparkleColors[Math.floor(Math.random()*sparkleColors.length)]};
          animation-duration:${2+Math.random()*4}s;
          animation-delay:${Math.random()*5}s;
        `;
        container.appendChild(s);
      }
    })();

    // Boot
    resetGame();
  </script>
</body>
</html>
